<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro OBJETIBUM</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Fondo negro */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .intro-container {
            text-align: center;
            animation: fadeIn 3s ease-in-out;
        }

        .logo {
            max-width: 300px;
            animation: zoomIn 3s ease-in-out;
        }

        .intro-text {
            color: #fff;
            font-size: 2rem;
            margin-top: 1rem;
            opacity: 0;
            animation: textAppear 3s ease-in-out 1.5s forwards;
        }

        /* Animaciones */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes textAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="intro-container">
        <img src="media/logo.webp" alt="Logo OBJETIBUM" class="logo">
        <h1 class="intro-text">NOTICIAS</h1>
    </div>

    <script>
        // Redirige a la página principal después de la animación
        setTimeout(() => {
            window.location.href = "principal.html"; // Cambia por tu página principal
        }, 4000);
    </script>
</body>
</html>
